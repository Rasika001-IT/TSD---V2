name: Build, Push & Deploy TSD Magazine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tsd-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tsd-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=https://tsdmagazine.com/api
            VITE_FRONTEND_URL=https://tsdmagazine.com
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tsd-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tsd-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, linux]
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub on runner
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy containers
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          docker network create tsd-network 2>/dev/null || true

          # Stop old containers
          docker stop tsd-backend tsd-frontend 2>/dev/null || true
          docker rm tsd-backend tsd-frontend 2>/dev/null || true

          # Start backend
          docker run -d --name tsd-backend \
            --restart unless-stopped \
            --network tsd-network \
            -v /home/ubuntu/tsd/backend/.env:/app/.env:ro \
            -p 3000:3000 \
            "${DH_USER}/tsd-backend:${SHA}"

          # Start frontend
          docker run -d --name tsd-frontend \
            --restart unless-stopped \
            --network tsd-network \
            -p 80:80 \
            -p 443:443 \
            -v /etc/letsencrypt:/etc/letsencrypt:ro \
            "${DH_USER}/tsd-frontend:${SHA}"

          sleep 5
          docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
