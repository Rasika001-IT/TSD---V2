name: Build, Push & Deploy TSD Magazine

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Backend build
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          no-cache: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tsd-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tsd-backend:latest

      # Frontend build (NO CACHE FIX)
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          no-cache: true   # IMPORTANT FIX
          build-args: |
            VITE_API_URL=https://tsdmagazine.com/api
            VITE_FRONTEND_URL=https://tsdmagazine.com
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tsd-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tsd-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, linux]
    environment: production

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy containers
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          echo "Pulling latest images..."
          docker pull "${DH_USER}/tsd-backend:${SHA}"
          docker pull "${DH_USER}/tsd-frontend:${SHA}"

          echo "Cleaning old containers..."
          docker stop tsd-frontend tsd-backend tsd-redis 2>/dev/null || true
          docker rm tsd-frontend tsd-backend tsd-redis 2>/dev/null || true

          echo "Recreating network..."
          docker network rm tsd-network 2>/dev/null || true
          docker network create tsd-network

          echo "Starting Redis..."
          docker run -d --name tsd-redis \
            --network tsd-network \
            redis:7-alpine \
            redis-server --appendonly yes

          sleep 3

          echo "Starting Backend..."
          docker run -d --name tsd-backend \
            --restart unless-stopped \
            --network tsd-network \
            -v /home/ubuntu/tsd/backend/.env:/app/.env:ro \
            -p 3000:3000 \
            "${DH_USER}/tsd-backend:${SHA}"

          echo "Waiting for backend..."
          sleep 8

          echo "Starting Frontend..."
          docker run -d --name tsd-frontend \
            --restart unless-stopped \
            --network tsd-network \
            -p 80:80 \
            -p 443:443 \
            -v /etc/letsencrypt:/etc/letsencrypt:ro \
            "${DH_USER}/tsd-frontend:${SHA}"

          sleep 5

          echo "Containers status:"
          docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"

          echo "Network test:"
          docker exec tsd-frontend ping -c 2 tsd-backend || true